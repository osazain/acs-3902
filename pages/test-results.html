<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <!-- Theme Initialization -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', savedTheme);
        })();
    </script>
    
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="ACS-3902 Test Results - Comprehensive performance analysis with topic breakdowns, question review, and study recommendations.">
    <title>Test Results | ACS-3902 Practice Platform</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/themes.css">
    <link rel="stylesheet" href="../css/components.css">
    
    <!-- Syntax Highlighting -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/languages/sql.min.js"></script>
    
    <style>
        /* ========================================
           TEST RESULTS PAGE STYLES
        ======================================== */
        
        /* Page Layout */
        .results-page {
            padding: var(--space-6);
            max-width: 1200px;
            margin: 0 auto;
        }
        
        .page-header {
            text-align: center;
            margin-bottom: var(--space-8);
            padding: var(--space-6) 0;
        }
        
        .page-header h1 {
            font-size: var(--text-3xl);
            font-weight: 800;
            margin-bottom: var(--space-2);
            background: linear-gradient(135deg, var(--primary-500), var(--secondary-500));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .page-header p {
            color: var(--text-secondary);
            font-size: var(--text-lg);
        }
        
        /* ========================================
           SCORE SUMMARY CARD
        ======================================== */
        .score-summary-card {
            background: linear-gradient(135deg, var(--primary-600) 0%, var(--secondary-600) 100%);
            border-radius: var(--radius-2xl);
            padding: var(--space-8);
            margin-bottom: var(--space-8);
            color: white;
            position: relative;
            overflow: hidden;
            box-shadow: var(--shadow-xl);
        }
        
        .score-summary-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -20%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(255,255,255,0.15), transparent 60%);
            pointer-events: none;
        }
        
        .score-summary-content {
            display: grid;
            grid-template-columns: auto 1fr;
            gap: var(--space-8);
            align-items: center;
            position: relative;
            z-index: 1;
        }
        
        /* Score Gauge */
        .score-gauge-container {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        
        .score-gauge {
            width: 180px;
            height: 180px;
            position: relative;
        }
        
        .score-gauge svg {
            transform: rotate(-90deg);
        }
        
        .score-gauge-bg {
            fill: none;
            stroke: rgba(255,255,255,0.2);
            stroke-width: 12;
        }
        
        .score-gauge-fill {
            fill: none;
            stroke: white;
            stroke-width: 12;
            stroke-linecap: round;
            transition: stroke-dashoffset 1.5s ease-out;
        }
        
        .score-gauge-center {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
        }
        
        .score-percentage {
            font-size: 3rem;
            font-weight: 800;
            line-height: 1;
        }
        
        .score-label {
            font-size: var(--text-sm);
            opacity: 0.9;
            margin-top: var(--space-1);
        }
        
        /* Pass/Fail Indicator */
        .pass-fail-badge {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--radius-full);
            font-size: var(--text-sm);
            font-weight: 600;
            margin-top: var(--space-4);
            backdrop-filter: blur(10px);
        }
        
        .pass-fail-badge.pass {
            background: rgba(16, 185, 129, 0.3);
            border: 1px solid rgba(16, 185, 129, 0.5);
        }
        
        .pass-fail-badge.fail {
            background: rgba(239, 68, 68, 0.3);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }
        
        /* Score Details */
        .score-details {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-6);
        }
        
        .score-detail-item {
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            padding: var(--space-4);
            border-radius: var(--radius-xl);
            text-align: center;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .score-detail-value {
            font-size: var(--text-2xl);
            font-weight: 700;
            margin-bottom: var(--space-1);
        }
        
        .score-detail-label {
            font-size: var(--text-sm);
            opacity: 0.9;
        }
        
        /* Preparation Level */
        .prep-level-card {
            grid-column: 1 / -1;
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(10px);
            padding: var(--space-5);
            border-radius: var(--radius-xl);
            border: 1px solid rgba(255,255,255,0.25);
            margin-top: var(--space-4);
        }
        
        .prep-level-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-3);
        }
        
        .prep-level-title {
            font-weight: 600;
            font-size: var(--text-lg);
        }
        
        .prep-level-badge {
            padding: var(--space-1) var(--space-3);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
        }
        
        .prep-level-badge.exam-ready {
            background: rgba(16, 185, 129, 0.4);
        }
        
        .prep-level-badge.good-progress {
            background: rgba(59, 130, 246, 0.4);
        }
        
        .prep-level-badge.needs-study {
            background: rgba(245, 158, 11, 0.4);
        }
        
        .prep-level-badge.significant-gaps {
            background: rgba(239, 68, 68, 0.4);
        }
        
        .prep-level-description {
            font-size: var(--text-sm);
            opacity: 0.95;
            line-height: 1.6;
        }
        
        /* ========================================
           TOPIC BREAKDOWN SECTION
        ======================================== */
        .section-card {
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            padding: var(--space-6);
            margin-bottom: var(--space-6);
            box-shadow: var(--shadow-sm);
        }
        
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-6);
            flex-wrap: wrap;
            gap: var(--space-4);
        }
        
        .section-title {
            font-size: var(--text-xl);
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: var(--space-3);
        }
        
        .section-title-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--primary-500), var(--secondary-500));
            border-radius: var(--radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .section-subtitle {
            color: var(--text-secondary);
            font-size: var(--text-sm);
            margin-top: var(--space-1);
        }
        
        /* Topic Grid */
        .topics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: var(--space-4);
        }
        
        .topic-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            padding: var(--space-5);
            transition: all var(--transition-base);
        }
        
        .topic-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--primary-300);
        }
        
        [data-theme="dark"] .topic-card:hover {
            border-color: var(--primary-700);
        }
        
        .topic-card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: var(--space-3);
        }
        
        .topic-card-title {
            font-weight: 600;
            font-size: var(--text-sm);
            color: var(--text-primary);
            line-height: 1.4;
        }
        
        .topic-card-lecture {
            font-size: var(--text-xs);
            color: var(--text-muted);
            margin-top: var(--space-1);
        }
        
        .topic-status-badge {
            padding: var(--space-1) var(--space-2);
            border-radius: var(--radius-md);
            font-size: var(--text-xs);
            font-weight: 600;
            white-space: nowrap;
        }
        
        .topic-status-badge.strong {
            background: var(--success-50);
            color: var(--success-dark);
        }
        
        .topic-status-badge.needs-review {
            background: var(--warning-50);
            color: var(--warning-dark);
        }
        
        .topic-status-badge.critical {
            background: var(--danger-50);
            color: var(--danger-dark);
        }
        
        [data-theme="dark"] .topic-status-badge.strong {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-light);
        }
        
        [data-theme="dark"] .topic-status-badge.needs-review {
            background: rgba(245, 158, 11, 0.2);
            color: var(--warning-light);
        }
        
        [data-theme="dark"] .topic-status-badge.critical {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-light);
        }
        
        .topic-stats {
            display: flex;
            justify-content: space-between;
            font-size: var(--text-sm);
            color: var(--text-secondary);
            margin-bottom: var(--space-3);
        }
        
        /* Topic Progress Bar */
        .topic-progress-container {
            height: 8px;
            background: var(--border-light);
            border-radius: var(--radius-full);
            overflow: hidden;
        }
        
        .topic-progress-fill {
            height: 100%;
            border-radius: var(--radius-full);
            transition: width 1s ease-out;
            position: relative;
        }
        
        .topic-progress-fill::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.3), transparent);
            animation: shimmer 2s infinite;
        }
        
        @keyframes shimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .topic-progress-fill.strong {
            background: linear-gradient(90deg, var(--success-500), var(--success-light));
        }
        
        .topic-progress-fill.needs-review {
            background: linear-gradient(90deg, var(--warning-500), var(--warning-light));
        }
        
        .topic-progress-fill.critical {
            background: linear-gradient(90deg, var(--danger-500), var(--danger-light));
        }
        
        /* ========================================
           QUESTION REVIEW SECTION
        ======================================== */
        .review-filters {
            display: flex;
            gap: var(--space-2);
            margin-bottom: var(--space-4);
            flex-wrap: wrap;
        }
        
        .filter-btn {
            padding: var(--space-2) var(--space-4);
            border: 1px solid var(--border-light);
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border-radius: var(--radius-lg);
            cursor: pointer;
            transition: all var(--transition-fast);
            font-size: var(--text-sm);
            font-weight: 500;
        }
        
        .filter-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .filter-btn.active {
            background: var(--primary-500);
            color: white;
            border-color: var(--primary-500);
        }
        
        .filter-btn.incorrect-filter.active {
            background: var(--danger-500);
            border-color: var(--danger-500);
        }
        
        .filter-btn.correct-filter.active {
            background: var(--success-500);
            border-color: var(--success-500);
        }
        
        /* Question List */
        .questions-list {
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
        }
        
        .question-item {
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            overflow: hidden;
            transition: all var(--transition-fast);
        }
        
        .question-item:hover {
            border-color: var(--border-medium);
        }
        
        .question-header {
            display: flex;
            align-items: center;
            gap: var(--space-4);
            padding: var(--space-4);
            cursor: pointer;
            transition: background var(--transition-fast);
        }
        
        .question-header:hover {
            background: var(--bg-tertiary);
        }
        
        .question-number {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 600;
            flex-shrink: 0;
        }
        
        .question-number.correct {
            background: var(--success-50);
            color: var(--success-dark);
        }
        
        .question-number.incorrect {
            background: var(--danger-50);
            color: var(--danger-dark);
        }
        
        [data-theme="dark"] .question-number.correct {
            background: rgba(16, 185, 129, 0.2);
            color: var(--success-light);
        }
        
        [data-theme="dark"] .question-number.incorrect {
            background: rgba(239, 68, 68, 0.2);
            color: var(--danger-light);
        }
        
        .question-status-icon {
            font-size: 1.25rem;
            flex-shrink: 0;
        }
        
        .question-status-icon.correct {
            color: var(--success-500);
        }
        
        .question-status-icon.incorrect {
            color: var(--danger-500);
        }
        
        .question-info {
            flex: 1;
            min-width: 0;
        }
        
        .question-topic-tag {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-2);
            background: var(--primary-50);
            color: var(--primary-700);
            border-radius: var(--radius-md);
            font-size: var(--text-xs);
            font-weight: 500;
            margin-bottom: var(--space-1);
        }
        
        [data-theme="dark"] .question-topic-tag {
            background: var(--primary-900);
            color: var(--primary-300);
        }
        
        .question-preview {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .question-points {
            font-size: var(--text-sm);
            color: var(--text-muted);
            font-weight: 500;
            flex-shrink: 0;
        }
        
        .view-details-btn {
            padding: var(--space-2) var(--space-3);
            background: var(--bg-tertiary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-md);
            font-size: var(--text-xs);
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
            flex-shrink: 0;
        }
        
        .view-details-btn:hover {
            background: var(--primary-50);
            color: var(--primary-600);
            border-color: var(--primary-300);
        }
        
        /* Expanded Question Details */
        .question-details {
            display: none;
            border-top: 1px solid var(--border-light);
            background: var(--bg-primary);
        }
        
        .question-item.expanded .question-details {
            display: block;
        }
        
        .question-item.expanded {
            border-color: var(--primary-300);
            box-shadow: var(--shadow-md);
        }
        
        [data-theme="dark"] .question-item.expanded {
            border-color: var(--primary-700);
        }
        
        .details-content {
            padding: var(--space-5);
        }
        
        .question-full-text {
            font-size: var(--text-base);
            color: var(--text-primary);
            margin-bottom: var(--space-5);
            line-height: 1.6;
        }
        
        /* Answers Comparison */
        .answers-comparison {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: var(--space-4);
            margin-bottom: var(--space-5);
        }
        
        .answer-box {
            padding: var(--space-4);
            border-radius: var(--radius-lg);
            border: 2px solid;
        }
        
        .answer-box.yours {
            border-color: var(--danger-300);
            background: var(--danger-50);
        }
        
        .answer-box.yours.correct {
            border-color: var(--success-300);
            background: var(--success-50);
        }
        
        .answer-box.correct {
            border-color: var(--success-300);
            background: var(--success-50);
        }
        
        [data-theme="dark"] .answer-box.yours {
            background: rgba(239, 68, 68, 0.1);
            border-color: rgba(239, 68, 68, 0.3);
        }
        
        [data-theme="dark"] .answer-box.yours.correct,
        [data-theme="dark"] .answer-box.correct {
            background: rgba(16, 185, 129, 0.1);
            border-color: rgba(16, 185, 129, 0.3);
        }
        
        .answer-label {
            font-size: var(--text-xs);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: var(--space-2);
            color: var(--text-muted);
        }
        
        .answer-box.yours:not(.correct) .answer-label {
            color: var(--danger-500);
        }
        
        .answer-box.correct .answer-label,
        .answer-box.yours.correct .answer-label {
            color: var(--success-500);
        }
        
        .answer-value {
            font-size: var(--text-sm);
            color: var(--text-primary);
        }
        
        .answer-value pre {
            margin: 0;
            padding: var(--space-3);
            background: var(--code-bg);
            border-radius: var(--radius-md);
            overflow-x: auto;
        }
        
        .answer-value code {
            font-family: var(--font-mono);
            font-size: 0.875rem;
        }
        
        /* ========================================
           COLLAPSIBLE EXPLANATION SYSTEM
        ======================================== */
        .explanation-section {
            margin-top: var(--space-4);
        }
        
        .explanation-toggle {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-3) var(--space-4);
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 600;
            color: var(--text-primary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .explanation-toggle:hover {
            background: var(--bg-tertiary);
            border-color: var(--primary-300);
        }
        
        .explanation-toggle-icon {
            transition: transform var(--transition-fast);
        }
        
        .explanation-toggle[aria-expanded="true"] .explanation-toggle-icon {
            transform: rotate(180deg);
        }
        
        .explanation-content {
            display: none;
            padding: var(--space-4);
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-top: none;
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
        }
        
        .explanation-toggle[aria-expanded="true"] + .explanation-content {
            display: block;
        }
        
        .explanation-block {
            margin-bottom: var(--space-4);
        }
        
        .explanation-block:last-child {
            margin-bottom: 0;
        }
        
        .explanation-block-title {
            font-size: var(--text-sm);
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: var(--space-2);
            display: flex;
            align-items: center;
            gap: var(--space-2);
        }
        
        .explanation-block-content {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            line-height: 1.7;
            padding-left: var(--space-6);
        }
        
        .explanation-block-content p {
            margin-bottom: var(--space-2);
        }
        
        .explanation-block-content ul {
            margin: var(--space-2) 0;
            padding-left: var(--space-4);
        }
        
        .explanation-block-content li {
            margin-bottom: var(--space-1);
        }
        
        /* Reference Link */
        .reference-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-3);
            background: var(--primary-50);
            color: var(--primary-600);
            border-radius: var(--radius-md);
            font-size: var(--text-sm);
            font-weight: 500;
            text-decoration: none;
            margin-top: var(--space-2);
            transition: all var(--transition-fast);
        }
        
        .reference-link:hover {
            background: var(--primary-100);
            color: var(--primary-700);
        }
        
        [data-theme="dark"] .reference-link {
            background: var(--primary-900);
            color: var(--primary-300);
        }
        
        /* Additional Resources */
        .resources-list {
            display: flex;
            flex-wrap: wrap;
            gap: var(--space-2);
            margin-top: var(--space-2);
        }
        
        .resource-link {
            display: inline-flex;
            align-items: center;
            gap: var(--space-1);
            padding: var(--space-1) var(--space-3);
            background: var(--bg-card);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-full);
            font-size: var(--text-xs);
            color: var(--text-secondary);
            text-decoration: none;
            transition: all var(--transition-fast);
        }
        
        .resource-link:hover {
            background: var(--accent-50);
            color: var(--accent-dark);
            border-color: var(--accent-300);
        }
        
        [data-theme="dark"] .resource-link:hover {
            background: var(--accent-900);
        }
        
        /* ========================================
           ACTION ITEMS
        ======================================== */
        .actions-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: var(--space-4);
        }
        
        .action-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            padding: var(--space-6);
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-xl);
            text-decoration: none;
            color: var(--text-primary);
            transition: all var(--transition-base);
            cursor: pointer;
        }
        
        .action-card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow-lg);
            border-color: var(--primary-300);
        }
        
        .action-icon {
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--primary-500), var(--secondary-500));
            border-radius: var(--radius-xl);
            font-size: 1.75rem;
            margin-bottom: var(--space-4);
        }
        
        .action-title {
            font-weight: 600;
            margin-bottom: var(--space-1);
        }
        
        .action-description {
            font-size: var(--text-sm);
            color: var(--text-secondary);
        }
        
        /* ========================================
           EMPTY STATES
        ======================================== */
        .empty-state {
            text-align: center;
            padding: var(--space-12);
            color: var(--text-secondary);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: var(--space-4);
            opacity: 0.5;
        }
        
        .empty-state-title {
            font-size: var(--text-xl);
            font-weight: 600;
            margin-bottom: var(--space-2);
            color: var(--text-primary);
        }
        
        .empty-state-text {
            margin-bottom: var(--space-6);
        }
        
        /* ========================================
           EXPORT BUTTON
        ======================================== */
        .export-btn {
            display: inline-flex;
            align-items: center;
            gap: var(--space-2);
            padding: var(--space-2) var(--space-4);
            background: var(--bg-secondary);
            border: 1px solid var(--border-light);
            border-radius: var(--radius-lg);
            font-size: var(--text-sm);
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            transition: all var(--transition-fast);
        }
        
        .export-btn:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border-color: var(--border-medium);
        }
        
        /* ========================================
           RESPONSIVE DESIGN
        ======================================== */
        @media (max-width: 1024px) {
            .score-summary-content {
                grid-template-columns: 1fr;
                text-align: center;
            }
            
            .score-details {
                grid-template-columns: repeat(2, 1fr);
            }
            
            .answers-comparison {
                grid-template-columns: 1fr;
            }
        }
        
        @media (max-width: 768px) {
            .results-page {
                padding: var(--space-4);
            }
            
            .score-details {
                grid-template-columns: 1fr;
            }
            
            .topics-grid {
                grid-template-columns: 1fr;
            }
            
            .question-header {
                flex-wrap: wrap;
            }
            
            .question-points {
                width: 100%;
                text-align: left;
                margin-top: var(--space-2);
            }
            
            .review-filters {
                overflow-x: auto;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
                padding-bottom: var(--space-2);
            }
        }
        
        /* ========================================
           ANIMATIONS
        ======================================== */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .animate-in {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        
        .section-card {
            animation: fadeInUp 0.5s ease-out forwards;
        }
        
        .section-card:nth-child(1) { animation-delay: 0.1s; }
        .section-card:nth-child(2) { animation-delay: 0.2s; }
        .section-card:nth-child(3) { animation-delay: 0.3s; }
        .section-card:nth-child(4) { animation-delay: 0.4s; }

    <script>
        // ========================================
        // TOPIC DEFINITIONS
        // ========================================
        const TOPIC_DEFINITIONS = [
            { id: 'lecture1', name: 'Course Introduction', lecture: 'Lecture 1', icon: '📋' },
            { id: 'lecture2', name: 'SQL Fundamentals', lecture: 'Lecture 2', icon: '🔤' },
            { id: 'lecture3', name: 'Joins, Aggregates, Subqueries', lecture: 'Lecture 3', icon: '🔗' },
            { id: 'lecture4', name: 'Views, CASE, UNION', lecture: 'Lecture 4', icon: '👁️' },
            { id: 'lecture5', name: 'Transactions', lecture: 'Lecture 5', icon: '💰' },
            { id: 'lecture6', name: 'CTEs, Triggers, Indexes', lecture: 'Lecture 6', icon: '⚡' },
            { id: 'lecture7', name: 'Indexes & Relational Algebra', lecture: 'Lecture 7', icon: '📇' },
            { id: 'lecture8', name: 'EERD Modeling', lecture: 'Lecture 8', icon: '📐' },
            { id: 'lecture9', name: '8-Step Transformation', lecture: 'Lecture 9', icon: '🔄' }
        ];
        
        // ========================================
        // LECTURE REFERENCES FOR EXPLANATIONS
        // ========================================
        const LECTURE_REFERENCES = {
            'lecture1': {
                concept: 'Database systems provide structured storage, retrieval, and management of data. Key concepts include the ACID properties, data independence, and the three-schema architecture.',
                resources: [
                    { name: 'Course Overview', url: './lectures/lecture-1.html' }
                ]
            },
            'lecture2': {
                concept: 'SQL fundamentals include SELECT statements, WHERE clauses, ORDER BY, GROUP BY, and basic filtering. Understanding data types and basic query structure is essential.',
                resources: [
                    { name: 'SQL Simulator', url: './simulator-join.html' },
                    { name: 'Lecture 2 Notes', url: './lectures/lecture-2.html' }
                ]
            },
            'lecture3': {
                concept: 'Joins combine data from multiple tables (INNER, LEFT, RIGHT, FULL). Aggregates (COUNT, SUM, AVG, MAX, MIN) summarize data. Subqueries enable nested queries for complex filtering.',
                resources: [
                    { name: 'Join Simulator', url: './simulator-join.html' },
                    { name: 'Aggregate Simulator', url: './simulator-aggregate.html' },
                    { name: 'Lecture 3 Notes', url: './lectures/lecture-3.html' }
                ]
            },
            'lecture4': {
                concept: 'Views are virtual tables based on query results. CASE expressions enable conditional logic in SQL. UNION combines results from multiple SELECT statements.',
                resources: [
                    { name: 'Lecture 4 Notes', url: './lectures/lecture-4.html' }
                ]
            },
            'lecture5': {
                concept: 'Transactions ensure database integrity through ACID properties. Commands: BEGIN, COMMIT, ROLLBACK. Concurrency control and isolation levels manage concurrent access.',
                resources: [
                    { name: 'Transaction Simulator', url: './simulator-transaction.html' },
                    { name: 'Lecture 5 Notes', url: './lectures/lecture-5.html' }
                ]
            },
            'lecture6': {
                concept: 'CTEs (Common Table Expressions) provide temporary named result sets. Triggers are automated actions on data changes. Indexes improve query performance.',
                resources: [
                    { name: 'CTE Simulator', url: './simulator-cte.html' },
                    { name: 'Lecture 6 Notes', url: './lectures/lecture-6.html' }
                ]
            },
            'lecture7': {
                concept: 'B-tree and hash indexes provide different performance characteristics. Relational Algebra includes selection (σ), projection (π), union (∪), intersection (∩), difference (-), join (⋈), and rename (ρ).',
                resources: [
                    { name: 'RA Simulator', url: './simulator-ra.html' },
                    { name: 'Query Tree Simulator', url: './simulator-query-tree.html' },
                    { name: 'Lecture 7 Notes', url: './lectures/lecture-7.html' }
                ]
            },
            'lecture8': {
                concept: 'EERD modeling extends ER diagrams with subtypes, superclasses, and specialization. Notations include Chen and IE (Crow\'s Foot). Understanding cardinality and participation constraints is key.',
                resources: [
                    { name: 'EERD Simulator', url: './simulator-eerd.html' },
                    { name: 'Subtype Validator', url: './simulator-subtype-validator.html' },
                    { name: 'Lecture 8 Notes', url: './lectures/lecture-8.html' }
                ]
            },
            'lecture9': {
                concept: 'The 8-Step Transformation process converts EERDs to relational schemas. Steps include mapping entities, relationships, subtypes, weak entities, and applying normalization.',
                resources: [
                    { name: 'Transformation Wizard', url: './simulator-transformation-wizard.html' },
                    { name: 'Lecture 9 Notes', url: './lectures/lecture-9.html' }
                ]
            }
        };
        
        // ========================================
        // STATE
        // ========================================
        let currentResults = null;
        let currentFilter = 'all';
        let expandedQuestions = new Set();
        
        // ========================================
        // INITIALIZATION
        // ========================================
        document.addEventListener('DOMContentLoaded', () => {
            initializeTheme();
            initializeSidebar();
            loadResults();
        });
        
        // ========================================
        // THEME MANAGEMENT
        // ========================================
        function initializeTheme() {
            const themeToggle = document.getElementById('theme-toggle');
            const themeSwitch = document.getElementById('theme-switch');
            const savedTheme = localStorage.getItem('theme') || 'light';
            
            if (savedTheme === 'dark') {
                themeSwitch.classList.add('active');
            }
            
            themeToggle.addEventListener('click', () => {
                const isDark = themeSwitch.classList.toggle('active');
                const theme = isDark ? 'dark' : 'light';
                document.documentElement.setAttribute('data-theme', theme);
                localStorage.setItem('theme', theme);
            });
        }
        
        // ========================================
        // SIDEBAR MANAGEMENT
        // ========================================
        function initializeSidebar() {
            const menuToggle = document.getElementById('menu-toggle');
            const sidebar = document.getElementById('sidebar');
            const overlay = document.getElementById('sidebar-overlay');
            
            function toggleSidebar() {
                menuToggle.classList.toggle('active');
                sidebar.classList.toggle('active');
                overlay.classList.toggle('active');
            }
            
            menuToggle?.addEventListener('click', toggleSidebar);
            overlay?.addEventListener('click', toggleSidebar);
        }
        
        // ========================================
        // LOAD RESULTS
        // ========================================
        function loadResults() {
            // Try to get results from localStorage/sessionStorage
            const storedResults = sessionStorage.getItem('lastTestResults') || 
                                 localStorage.getItem('lastTestResults');
            
            if (storedResults) {
                currentResults = JSON.parse(storedResults);
                renderResults(currentResults);
            } else {
                // Show demo results for development/testing
                renderDemoResults();
            }
        }
        
        // ========================================
        // DEMO RESULTS (for testing)
        // ========================================
        function renderDemoResults() {
            const demoResults = {
                testTitle: 'ACS-3902 Comprehensive Practice Test',
                testId: 'comprehensive-1',
                score: 72,
                maxScore: 100,
                percentage: 72,
                correctCount: 18,
                incorrectCount: 7,
                totalQuestions: 25,
                timeSpent: 2340,
                timeLimit: 3600,
                questionResults: generateDemoQuestions()
            };
            
            currentResults = demoResults;
            renderResults(demoResults);
        }
        
        function generateDemoQuestions() {
            const questions = [];
            const topics = ['lecture1', 'lecture2', 'lecture3', 'lecture4', 'lecture5', 'lecture6', 'lecture7', 'lecture8', 'lecture9'];
            
            for (let i = 1; i <= 25; i++) {
                const topicIndex = (i - 1) % topics.length;
                const isCorrect = i <= 18; // 18 correct, 7 incorrect
                const topic = topics[topicIndex];
                
                questions.push({
                    number: i,
                    question: getDemoQuestionText(i, topic),
                    userAnswer: isCorrect ? 'correct-answer' : 'wrong-answer',
                    correctAnswer: 'correct-answer',
                    isCorrect: isCorrect,
                    topic: topic,
                    points: isCorrect ? 4 : 0,
                    maxPoints: 4,
                    explanation: getDemoExplanation(i, topic),
                    userAnswerExplanation: 'Your answer showed confusion about the core concept.',
                    correctAnswerExplanation: 'This is the correct approach because it properly applies the SQL/DB principle.',
                    lectureReference: topic
                });
            }
            
            return questions;
        }
        
        function getDemoQuestionText(i, topic) {
            const questions = {
                'lecture1': 'What is the primary purpose of a Database Management System (DBMS)?',
                'lecture2': 'Write a SQL query to select all employees with salary greater than 50000.',
                'lecture3': 'Which type of JOIN returns only matching rows from both tables?',
                'lecture4': 'What SQL keyword is used to combine the results of two SELECT statements?',
                'lecture5': 'Which ACID property ensures that a transaction brings the database from one valid state to another?',
                'lecture6': 'What is the purpose of a database trigger?',
                'lecture7': 'Write the relational algebra expression for selecting employees with salary > 50000.',
                'lecture8': 'In Chen notation, what shape represents an entity?',
                'lecture9': 'What is the first step in the 8-step transformation process?'
            };
            return questions[topic] || `Question ${i} about database systems`;
        }
        
        function getDemoExplanation(i, topic) {
            return LECTURE_REFERENCES[topic]?.concept || 'This question tests fundamental database concepts.';
        }
        
        // ========================================
        // RENDER RESULTS
        // ========================================
        function renderResults(results) {
            const container = document.getElementById('results-container');
            const topicScores = calculateTopicScores(results.questionResults);
            const prepLevel = getPreparationLevel(results.percentage);
            
            container.innerHTML = `
                <div class="page-header">
                    <h1>🎯 Test Results</h1>
                    <p>${results.testTitle}</p>
                </div>
                
                ${renderScoreSummary(results, prepLevel)}
                ${renderTopicBreakdown(topicScores)}
                ${renderQuestionReview(results.questionResults)}
                ${renderActionItems(results, topicScores)}
            `;
            
            // Initialize gauge animation
            setTimeout(() => animateGauge(results.percentage), 100);
            
            // Initialize syntax highlighting
            if (window.hljs) {
                document.querySelectorAll('pre code').forEach(block => {
                    hljs.highlightElement(block);
                });
            }
        }
        
        // ========================================
        // SCORE SUMMARY
        // ========================================
        function renderScoreSummary(results, prepLevel) {
            const circumference = 2 * Math.PI * 80; // radius = 80
            
            return `
                <div class="score-summary-card">
                    <div class="score-summary-content">
                        <div class="score-gauge-container">
                            <div class="score-gauge">
                                <svg width="180" height="180" viewBox="0 0 180 180">
                                    <circle class="score-gauge-bg" 
                                            cx="90" cy="90" r="80"/>
                                    <circle class="score-gauge-fill" 
                                            cx="90" cy="90" r="80"
                                            stroke-dasharray="${circumference}"
                                            stroke-dashoffset="${circumference}"
                                            id="score-gauge-fill"/>
                                </svg>
                                <div class="score-gauge-center">
                                    <div class="score-percentage">${results.percentage.toFixed(0)}%</div>
                                    <div class="score-label">Score</div>
                                </div>
                            </div>
                            <div class="pass-fail-badge ${results.percentage >= 60 ? 'pass' : 'fail'}">
                                ${results.percentage >= 60 ? '✓' : '✗'} 
                                ${results.percentage >= 60 ? 'PASSED' : 'NEEDS IMPROVEMENT'}
                            </div>
                        </div>
                        
                        <div class="score-details">
                            <div class="score-detail-item">
                                <div class="score-detail-value">${results.correctCount}/${results.totalQuestions}</div>
                                <div class="score-detail-label">Questions Correct</div>
                            </div>
                            <div class="score-detail-item">
                                <div class="score-detail-value">${formatTime(results.timeSpent)}</div>
                                <div class="score-detail-label">Time Taken</div>
                            </div>
                            <div class="score-detail-item">
                                <div class="score-detail-value">${results.score}/${results.maxScore}</div>
                                <div class="score-detail-label">Points Earned</div>
                            </div>
                            
                            <div class="prep-level-card">
                                <div class="prep-level-header">
                                    <span class="prep-level-title">📊 Preparation Assessment</span>
                                    <span class="prep-level-badge ${prepLevel.class}">${prepLevel.label}</span>
                                </div>
                                <div class="prep-level-description">
                                    ${prepLevel.description}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function animateGauge(percentage) {
            const gaugeFill = document.getElementById('score-gauge-fill');
            if (!gaugeFill) return;
            
            const circumference = 2 * Math.PI * 80;
            const offset = circumference - (percentage / 100) * circumference;
            
            gaugeFill.style.strokeDashoffset = offset;
        }
        
        function getPreparationLevel(percentage) {
            if (percentage >= 80) {
                return {
                    label: 'Exam Ready',
                    class: 'exam-ready',
                    description: 'Excellent work! You have a strong grasp of the material and are well-prepared for the exam. Focus on maintaining your knowledge through regular review.'
                };
            } else if (percentage >= 60) {
                return {
                    label: 'Good Progress',
                    class: 'good-progress',
                    description: 'You\'re making good progress. Review the topics marked as "Needs Review" to strengthen your understanding before the exam.'
                };
            } else if (percentage >= 40) {
                return {
                    label: 'Needs More Study',
                    class: 'needs-study',
                    description: 'You need more preparation. Focus on understanding the fundamental concepts in your weak areas. Use the simulators and lecture notes to reinforce your learning.'
                };
            } else {
                return {
                    label: 'Significant Gaps',
                    class: 'significant-gaps',
                    description: 'There are significant gaps in your understanding. We recommend starting with the lecture notes and working through the simulators before attempting more practice tests.'
                };
            }
        }
        
        // ========================================
        // TOPIC BREAKDOWN
        // ========================================
        function calculateTopicScores(questions) {
            const scores = {};
            
            TOPIC_DEFINITIONS.forEach(topic => {
                scores[topic.id] = {
                    ...topic,
                    correct: 0,
                    total: 0,
                    percentage: 0,
                    status: 'critical'
                };
            });
            
            questions.forEach(q => {
                const topicId = q.topic || 'lecture1';
                if (scores[topicId]) {
                    scores[topicId].total++;
                    if (q.isCorrect) {
                        scores[topicId].correct++;
                    }
                }
            });
            
            Object.values(scores).forEach(topic => {
                if (topic.total > 0) {
                    topic.percentage = Math.round((topic.correct / topic.total) * 100);
                }
                
                if (topic.percentage >= 80) {
                    topic.status = 'strong';
                } else if (topic.percentage >= 60) {
                    topic.status = 'needs-review';
                } else {
                    topic.status = 'critical';
                }
            });
            
            return Object.values(scores).sort((a, b) => b.percentage - a.percentage);
        }
        
        function renderTopicBreakdown(topicScores) {
            return `
                <div class="section-card">
                    <div class="section-header">
                        <div>
                            <h2 class="section-title">
                                <span class="section-title-icon">📊</span>
                                Topic Breakdown
                            </h2>
                            <p class="section-subtitle">Performance by lecture topic</p>
                        </div>
                    </div>
                    
                    <div class="topics-grid">
                        ${topicScores.map(topic => renderTopicCard(topic)).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderTopicCard(topic) {
            const statusLabels = {
                'strong': 'Strong',
                'needs-review': 'Needs Review',
                'critical': 'Critical Gap'
            };
            
            return `
                <div class="topic-card">
                    <div class="topic-card-header">
                        <div>
                            <div class="topic-card-title">${topic.icon} ${topic.name}</div>
                            <div class="topic-card-lecture">${topic.lecture}</div>
                        </div>
                        <span class="topic-status-badge ${topic.status}">${statusLabels[topic.status]}</span>
                    </div>
                    <div class="topic-stats">
                        <span>${topic.correct}/${topic.total} correct</span>
                        <span>${topic.percentage}%</span>
                    </div>
                    <div class="topic-progress-container">
                        <div class="topic-progress-fill ${topic.status}" 
                             style="width: ${topic.percentage}%"></div>
                    </div>
                </div>
            `;
        }
        
        // ========================================
        // QUESTION REVIEW
        // ========================================
        function renderQuestionReview(questions) {
            const correctCount = questions.filter(q => q.isCorrect).length;
            const incorrectCount = questions.filter(q => !q.isCorrect).length;
            
            return `
                <div class="section-card">
                    <div class="section-header">
                        <div>
                            <h2 class="section-title">
                                <span class="section-title-icon">🔍</span>
                                Question Review
                            </h2>
                            <p class="section-subtitle">Review your answers and learn from mistakes</p>
                        </div>
                        <button class="export-btn" onclick="exportResults()">
                            <span>📥</span>
                            <span>Export Results</span>
                        </button>
                    </div>
                    
                    <div class="review-filters">
                        <button class="filter-btn ${currentFilter === 'all' ? 'active' : ''}" 
                                onclick="filterQuestions('all')">
                            All (${questions.length})
                        </button>
                        <button class="filter-btn incorrect-filter ${currentFilter === 'incorrect' ? 'active' : ''}" 
                                onclick="filterQuestions('incorrect')">
                            Incorrect (${incorrectCount})
                        </button>
                        <button class="filter-btn correct-filter ${currentFilter === 'correct' ? 'active' : ''}" 
                                onclick="filterQuestions('correct')">
                            Correct (${correctCount})
                        </button>
                    </div>
                    
                    <div class="questions-list" id="questions-list">
                        ${questions.map((q, index) => renderQuestionItem(q, index)).join('')}
                    </div>
                </div>
            `;
        }
        
        function renderQuestionItem(question, index) {
            const topicDef = TOPIC_DEFINITIONS.find(t => t.id === question.topic) || TOPIC_DEFINITIONS[0];
            
            return `
                <div class="question-item ${question.isCorrect ? 'correct' : 'incorrect'}" 
                     data-correct="${question.isCorrect}" 
                     data-index="${index}"
                     id="question-${index}">
                    <div class="question-header" onclick="toggleQuestion(${index})">
                        <div class="question-number ${question.isCorrect ? 'correct' : 'incorrect'}">
                            ${question.number}
                        </div>
                        <div class="question-status-icon ${question.isCorrect ? 'correct' : 'incorrect'}">
                            ${question.isCorrect ? '✓' : '✗'}
                        </div>
                        <div class="question-info">
                            <div class="question-topic-tag">
                                <span>${topicDef.icon}</span>
                                <span>${topicDef.lecture}: ${topicDef.name}</span>
                            </div>
                            <div class="question-preview">${stripHtml(question.question)}</div>
                        </div>
                        <div class="question-points">${question.points}/${question.maxPoints} pts</div>
                        <button class="view-details-btn" onclick="event.stopPropagation(); toggleQuestion(${index})">
                            View Details
                        </button>
                    </div>
                    
                    <div class="question-details">
                        <div class="details-content">
                            <div class="question-full-text">${formatQuestionText(question.question)}</div>
                            
                            <div class="answers-comparison">
                                <div class="answer-box yours ${question.isCorrect ? 'correct' : ''}">
                                    <div class="answer-label">Your Answer</div>
                                    <div class="answer-value">
                                        ${formatAnswer(question.userAnswer, question)}
                                    </div>
                                </div>
                                ${!question.isCorrect ? `
                                    <div class="answer-box correct">
                                        <div class="answer-label">Correct Answer</div>
                                        <div class="answer-value">
                                            ${formatAnswer(question.correctAnswer, question)}
                                        </div>
                                    </div>
                                ` : `
                                    <div class="answer-box correct">
                                        <div class="answer-label">Correct Answer ✓</div>
                                        <div class="answer-value">
                                            ${formatAnswer(question.correctAnswer, question)}
                                        </div>
                                    </div>
                                `}
                            </div>
                            
                            ${!question.isCorrect ? renderExplanationSection(question) : renderCorrectExplanation(question)}
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderExplanationSection(question) {
            const reference = LECTURE_REFERENCES[question.topic] || LECTURE_REFERENCES['lecture1'];
            const resources = reference.resources || [];
            
            return `
                <div class="explanation-section">
                    <button class="explanation-toggle" 
                            aria-expanded="false"
                            onclick="toggleExplanation(this)">
                        <span>📚 Detailed Explanation</span>
                        <span class="explanation-toggle-icon">▼</span>
                    </button>
                    
                    <div class="explanation-content">
                        <div class="explanation-block">
                            <div class="explanation-block-title">📖 The Concept</div>
                            <div class="explanation-block-content">
                                <p>${reference.concept}</p>
                            </div>
                        </div>
                        
                        <div class="explanation-block">
                            <div class="explanation-block-title">❌ Why Your Answer Was Wrong</div>
                            <div class="explanation-block-content">
                                <p>${question.userAnswerExplanation || 'Your answer demonstrated a misunderstanding of the key concept. Review the fundamental principles and practice with the simulators.'}</p>
                            </div>
                        </div>
                        
                        <div class="explanation-block">
                            <div class="explanation-block-title">✅ Why the Correct Answer is Right</div>
                            <div class="explanation-block-content">
                                <p>${question.correctAnswerExplanation || 'The correct answer follows the established database principles for this topic. Understanding the underlying logic will help you solve similar problems.'}</p>
                            </div>
                        </div>
                        
                        <div class="explanation-block">
                            <div class="explanation-block-title">📚 Reference</div>
                            <div class="explanation-block-content">
                                <a href="./lectures/${question.topic || 'lecture-1'}.html" class="reference-link">
                                    <span>📄</span>
                                    <span>View ${reference.lecture || 'Lecture'} Notes</span>
                                    <span>→</span>
                                </a>
                            </div>
                        </div>
                        
                        <div class="explanation-block">
                            <div class="explanation-block-title">🛠️ Additional Resources</div>
                            <div class="explanation-block-content">
                                <div class="resources-list">
                                    ${resources.map(r => `
                                        <a href="${r.url}" class="resource-link">
                                            <span>🔧</span>
                                            <span>${r.name}</span>
                                        </a>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function renderCorrectExplanation(question) {
            const reference = LECTURE_REFERENCES[question.topic] || LECTURE_REFERENCES['lecture1'];
            
            return `
                <div class="explanation-section">
                    <button class="explanation-toggle" 
                            aria-expanded="false"
                            onclick="toggleExplanation(this)">
                        <span>📚 View Explanation</span>
                        <span class="explanation-toggle-icon">▼</span>
                    </button>
                    
                    <div class="explanation-content">
                        <div class="explanation-block">
                            <div class="explanation-block-title">📖 The Concept</div>
                            <div class="explanation-block-content">
                                <p>${reference.concept}</p>
                            </div>
                        </div>
                        
                        <div class="explanation-block">
                            <div class="explanation-block-title">✅ Explanation</div>
                            <div class="explanation-block-content">
                                <p>${question.explanation || 'Great job! You correctly applied the database concept.'}</p>
                            </div>
                        </div>
                        
                        <div class="explanation-block">
                            <div class="explanation-block-title">📚 Reference</div>
                            <div class="explanation-block-content">
                                <a href="./lectures/${question.topic || 'lecture-1'}.html" class="reference-link">
                                    <span>📄</span>
                                    <span>View Lecture Notes</span>
                                    <span>→</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function toggleQuestion(index) {
            const questionItem = document.getElementById(`question-${index}`);
            if (!questionItem) return;
            
            const isExpanded = questionItem.classList.toggle('expanded');
            
            if (isExpanded) {
                expandedQuestions.add(index);
                // Scroll into view if needed
                setTimeout(() => {
                    questionItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }, 100);
            } else {
                expandedQuestions.delete(index);
            }
        }
        
        function toggleExplanation(button) {
            const isExpanded = button.getAttribute('aria-expanded') === 'true';
            button.setAttribute('aria-expanded', !isExpanded);
        }
        
        function filterQuestions(filter) {
            currentFilter = filter;
            
            // Update active filter button
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // Filter questions
            const questions = document.querySelectorAll('.question-item');
            questions.forEach(q => {
                const isCorrect = q.dataset.correct === 'true';
                let show = false;
                
                switch(filter) {
                    case 'all': show = true; break;
                    case 'incorrect': show = !isCorrect; break;
                    case 'correct': show = isCorrect; break;
                }
                
                q.style.display = show ? 'block' : 'none';
            });
        }
        
        // ========================================
        // ACTION ITEMS
        // ========================================
        function renderActionItems(results, topicScores) {
            const weakTopics = topicScores.filter(t => t.status !== 'strong').slice(0, 3);
            const weakTopicLinks = weakTopics.map(t => `
                <a href="./lectures/${t.id.replace('lecture', 'lecture-')}.html" class="resource-link">
                    <span>📚</span>
                    <span>${t.lecture}</span>
                </a>
            `).join('');
            
            return `
                <div class="section-card">
                    <div class="section-header">
                        <div>
                            <h2 class="section-title">
                                <span class="section-title-icon">🎯</span>
                                Recommended Actions
                            </h2>
                            <p class="section-subtitle">Next steps to improve your performance</p>
                        </div>
                    </div>
                    
                    <div class="actions-grid">
                        <a href="./practice-test.html?retake=${results.testId}" class="action-card">
                            <div class="action-icon">🔄</div>
                            <div class="action-title">Retake Test</div>
                            <div class="action-description">Try again to improve your score</div>
                        </a>
                        
                        <div class="action-card" style="cursor: default;">
                            <div class="action-icon">📚</div>
                            <div class="action-title">Study Weak Areas</div>
                            <div class="action-description">
                                Focus on these topics:
                                <div class="resources-list" style="justify-content: center; margin-top: var(--space-2);">
                                    ${weakTopicLinks || '<span style="font-size: var(--text-xs);">Great job! No weak areas.</span>'}
                                </div>
                            </div>
                        </div>
                        
                        <a href="./simulators.html" class="action-card">
                            <div class="action-icon">🔧</div>
                            <div class="action-title">Practice Simulators</div>
                            <div class="action-description">Hands-on practice with interactive tools</div>
                        </a>
                        
                        <a href="./practice-test.html" class="action-card">
                            <div class="action-icon">📝</div>
                            <div class="action-title">New Practice Test</div>
                            <div class="action-description">Try a different set of questions</div>
                        </a>
                    </div>
                </div>
            `;
        }
        
        // ========================================
        // UTILITY FUNCTIONS
        // ========================================
        function formatTime(seconds) {
            if (!seconds) return '0:00';
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            return `${mins}:${secs.toString().padStart(2, '0')}`;
        }
        
        function formatQuestionText(text) {
            if (!text) return '';
            return text
                .replace(/```sql\n([\s\S]*?)```/g, '<pre><code class="language-sql">$1</code></pre>')
                .replace(/`([^`]+)`/g, '<code style="background: var(--bg-tertiary); padding: 0.125rem 0.375rem; border-radius: var(--radius-sm); font-family: var(--font-mono); font-size: 0.875em;">$1</code>')
                .replace(/\n/g, '<br>');
        }
        
        function formatAnswer(answer, question) {
            if (answer === null || answer === undefined || answer === 'wrong-answer') {
                return '<em style="color: var(--text-muted);">No answer provided</em>';
            }
            if (answer === 'correct-answer') {
                return '<span style="color: var(--success-500);">✓ Correct</span>';
            }
            // Check if answer looks like SQL
            if (answer.match(/SELECT|INSERT|UPDATE|DELETE|CREATE|ALTER|DROP/i)) {
                return `<pre><code class="language-sql">${escapeHtml(answer)}</code></pre>`;
            }
            return escapeHtml(answer);
        }
        
        function stripHtml(html) {
            const tmp = document.createElement('div');
            tmp.innerHTML = html;
            return tmp.textContent || tmp.innerText || '';
        }
        
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
        
        function exportResults() {
            if (!currentResults) return;
            
            const exportData = {
                title: currentResults.testTitle,
                date: new Date().toISOString(),
                score: currentResults.percentage,
                correct: currentResults.correctCount,
                total: currentResults.totalQuestions,
                timeSpent: formatTime(currentResults.timeSpent)
            };
            
            const blob = new Blob([JSON.stringify(exportData, null, 2)], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `test-results-${new Date().toISOString().split('T')[0]}.json`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            
            // Show feedback
            alert('Results exported successfully!');
        }
        
        // ========================================
        // NO RESULTS STATE
        // ========================================
        function renderNoResults() {
            const container = document.getElementById('results-container');
            container.innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📊</div>
                    <h2 class="empty-state-title">No Test Results Found</h2>
                    <p class="empty-state-text">Take a practice test to see your results and track your progress.</p>
                    <a href="./practice-test.html" class="action-card" style="display: inline-flex; width: auto; padding: var(--space-4) var(--space-6);">
                        <span style="margin-right: var(--space-2);">📝</span>
                        <span>Start Practice Test</span>
                    </a>
                </div>
            `;
        }
    </script>
</body>
</html>
